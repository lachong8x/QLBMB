{% extends "layout.html" %}

{% block title %}Trang chủ{% endblock %}

{% block content %}
    {% if user %}
        <h1 class="text-success">Chào mừng {{ user }}!</h1>
        <p><a href="{{ url_for('dashboard') }}" class="btn btn-primary">Đến bảng điều khiển</a></p>
    {% else %}
        <h1>Chào mừng khách!</h1>
        <p><a href="{{ url_for('login') }}" class="btn btn-secondary">Đăng nhập</a></p>
    {% endif %}
{% endblock %}
